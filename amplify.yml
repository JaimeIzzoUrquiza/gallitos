version: 1
backend:
  phases:
    build:
      commands:
        - rm -rf node_modules
        - npm install --include=optional
        # URL pública del frontend para el logo en correos de confirmación.
        # Amplify inyecta AWS_BRANCH y AWS_APP_ID en cada build.
        - export GALLITOS_APP_URL="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - npm install --include=optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
